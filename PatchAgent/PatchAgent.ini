# PatchAgent 설정 파일 (exe와 같은 폴더에 위치)
# 중앙서버 배포 공유 폴더 경로 (설비망에서 공유폴더로 접근 가능한 IP/이름)
CentralServer=\\192.168.0.10\Distribution
# 장비 모드: LF, SII, BGA, COB
Mode=LF
# PC 종류: Main, Vision, Inline 등 (중앙 공유폴더의 하위 경로로 사용됨)
PCType=Main
# 대상 프로그램 파일명
ProcessName=HDSInspector.exe
# 로컬 설치 루트 (하위에 bin/config/backup/temp_update 폴더가 있는 경로)
InstallRoot=D:\main
# 다수 PC가 동시에 신버전을 감지했을 때 대역폭/서버 부하가 몰리지 않도록,
# 매 실행마다 0~이 값(초) 사이 랜덤 대기 후 폴링한다. 생략 시 기본값 60.
MaxJitterSeconds=60
