# PatchAgent 설정 파일 (exe와 같은 폴더에 위치)
# 중앙서버 배포 공유 폴더 경로 (설비망에서 공유폴더로 접근 가능한 IP/이름)
CentralServer=\\192.168.0.10\Distribution
# 장비 모드: LF, SII, BGA, COB
Mode=LF
# PC 종류: Main, Vision, Inline 등 (중앙 공유폴더의 하위 경로로 사용됨)
PCType=Main
# 대상 프로그램 파일명
ProcessName=HDSInspector.exe
# 로컬 설치 루트 (하위에 bin/config/backup/temp_update 폴더가 있는 경로)
InstallRoot=D:\main
# 다수 PC가 동시에 신버전을 감지했을 때 대역폭/서버 부하가 몰리지 않도록,
# 새 버전을 실제로 복사(스테이징)하기 직전 0~이 값(초) 사이 랜덤 대기한다. 생략 시 기본값 60.
# 서버 LAN이 1GbE이고 설비 대수가 많으면(예: 120대) 크게(600~2400) 잡아
# 동시 전송 수를 낮추는 것이 유리하다. 10GbE면 60으로 충분.
MaxJitterSeconds=60
# 백업 보존 기간(일). backup\yyMMdd\ 폴더 중 이 기간이 지난 것은 패치 적용 시 자동 삭제한다.
# 생략 시 기본값 14. 0 이하로 두면 자동 삭제 안 함.
BackupRetentionDays=14
